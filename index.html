<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asaro Studio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui-panel">
        <div class="controls-row">
            <div class="control-group">
                <label>Ljusvinkel</label>
                <input type="range" id="lightAngle" min="0" max="360" value="45">
            </div>
            <div class="control-group">
                <label>Ljushöjd</label>
                <input type="range" id="lightHeight" min="-5" max="10" value="5">
            </div>
        </div>
        <div class="button-row">
            <button onclick="loadModel('standard')">Standard Plan</button>
            <button onclick="loadModel('male')">Man (Karaktär)</button>
            <button onclick="loadModel('female')">Kvinna (Mjukare)</button>
            <button onclick="setRembrandt()" class="blue-btn">Rembrandt-ljus</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
