<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Portrait Light Lab | Konstlabbet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p>Loading 3D Models...</p>
</div>

<div class="app-container">
    <header>
        <h1>3D Portrait Light Lab</h1>
    </header>

    <div class="canvas-area">
        <canvas id="mainCanvas"></canvas>
        <div id="drop-zone">Drop image here or click Upload</div>
    </div>

    <div class="toolbar">
        <div class="button-group">
            <button onclick="updateLight('rembrandt')" id="btn-rembrandt">Rembrandt</button>
            <button onclick="updateLight('side')" id="id-side">Side Light</button>
            <button onclick="updateLight('top')" id="id-top">Top Light</button>
            <button onclick="updateLight('original')" class="active" id="id-original">Original</button>
        </div>

        <div class="action-group">
            <button class="btn-toggle" onclick="toggleValues()" id="val-toggle">Value Mode: OFF</button>
            <button class="btn-primary" onclick="document.getElementById('fileInput').click()">Upload Portrait</button>
            <button class="btn-save" onclick="saveImage()">Download</button>
        </div>
    </div>

    <input type="file" id="fileInput" hidden accept="image/*">
    <div id="status-bar">Ready</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
<script src="script.js"></script>
</body>
</html>
