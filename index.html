<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomy Light Studio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div class="app-container">
        <div id="canvas-container"></div>

        <div class="ui-panel">
            <div class="controls-row">
                <div class="control-group">
                    <label>Ljusvinkel</label>
                    <input type="range" id="lightAngle" min="0" max="360" value="45">
                </div>
                <div class="control-group">
                    <label>Ljushöjd</label>
                    <input type="range" id="lightHeight" min="-5" max="10" value="5">
                </div>
            </div>
            
            <div class="button-row">
                <button onclick="loadModel('standard')" class="btn-model">Standard Plan</button>
                <button onclick="loadModel('old')" class="btn-model">Äldre Man</button>
                <button onclick="loadModel('female')" class="btn-model">Kvinna</button>
                <button onclick="setRembrandt()" class="btn-sub">Rembrandt-ljus</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
