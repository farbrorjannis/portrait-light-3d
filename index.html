<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Asaro Reference Studio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="ui-panel">
        <div class="slider-grid">
            <div class="input-box">
                <label>Ljusets Vinkel</label>
                <input type="range" id="lightAngle" min="0" max="360" value="45">
            </div>
            <div class="input-box">
                <label>Ljusets Höjd</label>
                <input type="range" id="lightHeight" min="-5" max="10" value="5">
            </div>
        </div>
        
        <div class="button-grid">
            <button onclick="changeModel('standard')">Standard Asaro</button>
            <button onclick="changeModel('male')">Man (Detaljerad)</button>
            <button onclick="changeModel('female')">Kvinna (Plan)</button>
            <button onclick="resetLighting()" class="accent">Rembrandt-ljus</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
