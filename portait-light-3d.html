<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Portrait Light Lab - Konstlabbet</title>
    <style>
        :root { --primary: #4A90E2; --dark: #2C3E50; --light: #F8F9FA; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eee; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { padding: 20px; text-align: center; } h1 { margin: 0; color: var(--dark); font-size: 1.5rem; }
        #lab-container { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 90vw; display: flex; flex-direction: column; align-items: center; }
        #canvas-wrapper { position: relative; margin-bottom: 20px; border-radius: 10px; overflow: hidden; background: #ddd; display: flex; justify-content: center; align-items: center; }
        canvas { max-width: 100%; max-height: 70vh; display: block; }
        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
        button { border: none; background: var(--light); padding: 12px 5px; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 0.8rem; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); color: var(--dark); }
        button:hover { background: var(--primary); color: white; } button.active { background: var(--dark); color: white; }
        .utility-bar { margin-top: 20px; display: flex; gap: 15px; width: 100%; }
        .btn-main { background: var(--primary); color: white; flex: 1; padding: 15px; border-radius: 15px; } .btn-value { background: #6c757d; color: white; flex: 1; }
        #file-input { display: none; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column;}
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 10px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p>Loading AI models & analyzing portrait...</p>
</div>

<div class="header">
    <h1>3D Portrait Light Lab</h1>
</div>

<div id="lab-container">
    <div id="canvas-wrapper">
        <canvas id="mainCanvas"></canvas>
        <p id="placeholder-text" style="position:absolute; color:#888;">Upload a portrait to start 3D Relighting</p>
    </div>

    <div class="controls">
        <button onclick="apply3DLight('rembrandt')" id="btn-rembrandt">Rembrandt</button>
        <button onclick="apply3DLight('side')" id="btn-side">Side</button>
        <button onclick="apply3DLight('top')" id="btn-top">Top</button>
        <button onclick="resetToOriginal()" class="active" id="btn-original">Original</button>
    </div>

    <div class="utility-bar">
        <button class="btn-value" onclick="toggleValues()" id="btn-val">Values: OFF</button>
        <button class="btn-main" onclick="document.getElementById('file-input').click()">Upload Image</button>
        <button class="btn-main" style="background:#28a745" onclick="downloadImage()">Download</button>
    </div>
    <input type="file" id="file-input" accept="image/*">
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js"></script>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const fileInput = document.getElementById('file-input');
    const loadingOverlay = document.getElementById('loading-overlay');
    let originalImage = null;
    let faceLandmarker;
    let currentResults = null;
    let valuesMode = false;
    let currentLight = 'original';

    // Initiera MediaPipe Face Landmarker
    async function initFaceLandmarker() {
        loadingOverlay.style.display = 'flex';
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" },
            runningMode: "IMAGE",
            numFaces: 1
        });
        console.log("MediaPipe initialized");
        loadingOverlay.style.display = 'none';
    }
    initFaceLandmarker();

    fileInput.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                originalImage = img;
                render();
                document.getElementById('placeholder-text').style.display = 'none';
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    async function apply3DLight(type) {
        if (!originalImage || !faceLandmarker) return;
        currentLight = type;

        loadingOverlay.style.display = 'flex';
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + type).classList.add('active');

        // Analysera ansiktet
        canvas.width = originalImage.width;
        canvas.height = originalImage.height;
        ctx.drawImage(originalImage, 0, 0);
        currentResults = faceLandmarker.detect(ctx.getImageData(0,0,canvas.width,canvas.height));
        
        console.log("Face Analysis Complete", currentResults);
        render();
        loadingOverlay.style.display = 'none';
    }

    function resetToOriginal() {
        currentLight = 'original';
        currentResults = null;
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-original').classList.add('active');
        render();
    }

    function render() {
        if (!originalImage) return;

        canvas.width = originalImage.width;
        canvas.height = originalImage.height;
        ctx.drawImage(originalImage, 0, 0);

        // Om vi har 3D-data, applicera det anatomiska ljuset
        if (currentResults && currentResults.faceLandmarks.length > 0) {
            applyAnatomicalShadows(currentResults.faceLandmarks[0]);
        }

        // Apply Value Mode (Posterization)
        if (valuesMode) {
            applyValueFilter();
        }
    }

    // --- DEN ANATOMISKA KÄRNAN (HÄR LIGGER MAGIN) ---
    function applyAnatomicalShadows(landmarks) {
        const w = canvas.width;
        const h = canvas.height;

        // Skapa en tom "skugg-mask" yta
        const shadowCanvas = document.createElement('canvas');
        shadowCanvas.width = w;
        shadowCanvas.height = h;
        const sCtx = shadowCanvas.getContext('2d');
        
        // Fyll med bas-ljus (originalbilden)
        sCtx.fillStyle = 'rgba(255,255,255,1)';
        sCtx.fillRect(0,0,w,h);

        // Hitta centrala punkter för att räkna ut 3D-normaler
        const tipOfNose = landmarks[1];
        const rightNose = landmarks[102];
        const leftNose = landmarks[331];
        const rightEyebrow = landmarks[105];
        const leftEyebrow = landmarks[334];
        const chin = landmarks[152];

        // Räkna ut en förenklad "normal" (riktning) för ansiktet
        const noseVector = { x: tipOfNose.x - ((rightNose.x + leftNose.x)/2), y: tipOfNose.y - ((rightNose.y + leftNose.y)/2) };
        const faceVector = { x: leftNose.x - rightNose.x, y: leftEyebrow.y - chin.y };

        // Skapa 3D-skuggor baserat på knappen
        let lightX = 0; let lightY = 0;
        if(currentLight === 'side') { lightX = 0.8; lightY = 0; }
        if(currentLight === 'rembrandt') { lightX = 0.5; lightY = -0.5; }
        if(currentLight === 'top') { lightX = 0; lightY = -1; }

        // --- SKAPA SKUGG-MASK (Anatomisk approximation) ---
        // I en skarpa versionen ritar vi skuggor och highlights baserat på 3D-normaler (vinklar)
        // Detta är en approximation som använder FaceMesh-data

        sCtx.fillStyle = 'rgba(0,0,0,0.8)'; // Skugg-färg
        sCtx.globalCompositeOperation = 'source-over';

        // 1. Skapa en mjuk bas-skugga på motsatt sida av ljuset
        const grad = sCtx.createLinearGradient(0, 0, w, h);
        grad.addColorStop(0, `rgba(255,255,255, ${Math.max(0, -lightX)})`); // Mörkare om ljusX är positivt
        grad.addColorStop(1, `rgba(255,255,255, ${Math.max(0, lightX)})`); // Mörkare om ljusX är negativt
        sCtx.fillStyle = grad;
        sCtx.fillRect(0,0,w,h);

        // 2. Skapa skuggor i ögonhålorna (om top light eller rembrandt)
        if(Math.abs(lightY) > 0.4) {
            sCtx.fillStyle = `rgba(0,0,0, ${Math.abs(lightY)*0.6})`;
            fillPolygon(sCtx, [landmarks[190], landmarks[243], landmarks[112], landmarks[26]]) // Höger ögonbryn
            fillPolygon(sCtx, [landmarks[414], landmarks[463], landmarks[341], landmarks[256]]) // Vänster ögonbryn
        }

        // 3. Skapa skugga under näsan (om top light)
        if(lightY < -0.4) {
            sCtx.fillStyle = `rgba(0,0,0,0.7)`;
            fillPolygon(sCtx, [landmarks[2], landmarks[164], landmarks[0], landmarks[37], landmarks[267]])
        }
        
        // 4. Skapa en mjukare nässkugga som följer näsan
        const noseSideGrad = sCtx.createLinearGradient(rightNose.x*w, tipOfNose.y*h, leftNose.x*w, tipOfNose.y*h);
        noseSideGrad.addColorStop(0, `rgba(255,255,255, ${Math.max(0, -lightX*0.7)})`);
        noseSideGrad.addColorStop(1, `rgba(255,255,255, ${Math.max(0, lightX*0.7)})`);
        sCtx.fillStyle = noseSideGrad;
        fillPolygon(sCtx, [landmarks[6], landmarks[102], landmarks[209], landmarks[1], landmarks[429], landmarks[331]])

        // --- BLANDA SKUGG-MASK MED ORIGINALBILD ---
        ctx.globalCompositeOperation = 'multiply'; // Blanda skuggorna naturligt
        ctx.drawImage(shadowCanvas, 0, 0);
        ctx.globalCompositeOperation = 'source-over'; // Återställ
    }

    function fillPolygon(ctx, points) {
        if(points.length === 0) return;
        ctx.beginPath();
        ctx.moveTo(points[0].x * canvas.width, points[0].y * canvas.height);
        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i].x * canvas.width, points[i].y * canvas.height);
        }
        ctx.closePath();
        ctx.fill();
    }

    function applyValueFilter() {
        let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            let avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
            let val = Math.floor(avg / 64) * 64; // Core: 4 steps of values
            data[i] = data[i+1] = data[i+2] = val;
        }
        ctx.putImageData(imgData, 0, 0);
    }

    function toggleValues() {
        valuesMode = !valuesMode;
        document.getElementById('btn-val').innerText = valuesMode ? "Values: ON" : "Values: OFF";
        render();
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'konstlabbet-3d-portrait.png';
        link.href = canvas.toDataURL();
        link.click();
    }
</script>
</body>
</html>
